<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeowStatus Admin</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="page page-admin">
    <div id="auth-modal" class="modal-overlay">
      <div class="modal-card">
        <p class="eyebrow">ADMIN ACCESS</p>
        <h2>管理面板登录</h2>
        <p class="subtitle">请输入 Admin Token 进入管理面板</p>

        <form id="login-form" class="col-form">
          <label>
            Admin Token
            <input id="login-token" type="password" autocomplete="off" required />
          </label>
          <button type="submit">登录</button>
        </form>

        <form id="rotate-form" class="col-form hidden">
          <p class="hint">首次登录需要先修改 Token 才能继续。</p>
          <label>
            新 Token
            <input id="new-token" type="password" autocomplete="off" minlength="8" required />
          </label>
          <label>
            确认新 Token
            <input id="confirm-token" type="password" autocomplete="off" minlength="8" required />
          </label>
          <button type="submit">修改 Token 并进入</button>
        </form>

        <p id="auth-message" class="hint auth-hint"></p>
      </div>
    </div>

    <main class="layout">
      <section class="panel panel-wide topbar-panel">
        <div class="brand-block">
          <p class="eyebrow">MEOW STATUS HUB</p>
          <h1>Admin Console</h1>
          <p class="subtitle">已登录后可管理状态、挂件与全站主题</p>
        </div>
        <div class="topbar-tools">
          <button id="logout-btn" type="button" class="danger">退出登录</button>
        </div>
      </section>

      <section class="panel">
        <h2>个人状态管理</h2>

        <div class="status-box compact">
          <div>
            <span class="label">当前状态</span>
            <strong id="current-state" class="state-value small">-</strong>
          </div>
          <div>
            <span class="label">备注</span>
            <span id="current-note">-</span>
          </div>
          <div>
            <span class="label">更新时间</span>
            <span id="current-updated-at">-</span>
          </div>
        </div>

        <div class="status-actions">
          <button data-state="working">工作中</button>
          <button data-state="studying">学习中</button>
          <button data-state="resting">休息中</button>
          <button data-state="away">离开中</button>
        </div>

        <form id="status-form" class="row-form">
          <input id="status-note" type="text" maxlength="160" placeholder="备注，例如：在写代码" />
          <button type="submit">更新状态</button>
        </form>
      </section>

      <section class="panel">
        <h2>添加 Minecraft 挂件</h2>
        <form id="mc-form" class="col-form">
          <label>
            名称
            <input id="mc-name" type="text" placeholder="我的生存服" />
          </label>
          <label>
            版本
            <select id="mc-edition">
              <option value="java">Java</option>
              <option value="bedrock">Bedrock</option>
            </select>
          </label>
          <label>
            主机
            <input id="mc-host" type="text" required placeholder="mc.example.com" />
          </label>
          <label>
            端口
            <input id="mc-port" type="number" min="1" max="65535" placeholder="留空使用默认端口" />
          </label>
          <button type="submit">创建挂件</button>
        </form>
      </section>

      <section class="panel panel-wide">
        <div class="panel-head">
          <h2>主题管理</h2>
          <span class="hint">仅管理面板可设置，公开页自动同步</span>
        </div>
        <div class="theme-toolbar">
          <input id="theme-search" type="text" placeholder="搜索主题（名称或ID）" autocomplete="off" />
          <p class="theme-current">当前主题：<strong id="theme-current-name">-</strong></p>
        </div>
        <div id="theme-grid" class="theme-grid"></div>
        <p id="theme-message" class="hint"></p>

        <div class="panel-head" style="margin-top: 14px">
          <h3>自定义主题编辑器</h3>
          <span class="hint">可在预设主题基础上叠加自定义样式</span>
        </div>
        <form id="custom-theme-form" class="custom-theme-grid">
          <label class="inline-field">
            <input id="custom-enabled" type="checkbox" />
            <span>启用自定义主题</span>
          </label>
          <label>
            背景色
            <input id="custom-background" type="color" value="#37474f" />
          </label>
          <label>
            辅助色
            <input id="custom-accent" type="color" value="#2196f3" />
          </label>
          <label>
            明暗模式
            <select id="custom-mode">
              <option value="auto">自动（跟随预设）</option>
              <option value="light">浅色</option>
              <option value="dark">深色</option>
            </select>
          </label>
          <label>
            背景样式
            <select id="custom-background-style">
              <option value="gradient">渐变</option>
              <option value="solid">纯色</option>
            </select>
          </label>
          <label>
            标题字体
            <select id="custom-heading-font">
              <option value="default">Default</option>
              <option value="display">Display</option>
              <option value="round">Round</option>
              <option value="serif">Serif</option>
              <option value="mono">Mono</option>
            </select>
          </label>
          <label>
            正文字体
            <select id="custom-body-font">
              <option value="default">Default</option>
              <option value="round">Round</option>
              <option value="serif">Serif</option>
              <option value="mono">Mono</option>
              <option value="display">Display</option>
            </select>
          </label>
          <label class="range-field">
            字号缩放（85%-130%）
            <input id="custom-font-scale" type="range" min="85" max="130" step="1" value="100" />
            <span id="custom-font-scale-output" class="range-field-output">100%</span>
          </label>
          <label class="range-field">
            圆角缩放（75%-150%）
            <input id="custom-radius-scale" type="range" min="75" max="150" step="1" value="100" />
            <span id="custom-radius-scale-output" class="range-field-output">100%</span>
          </label>
          <label class="range-field">
            阴影强度（50%-180%）
            <input id="custom-shadow-strength" type="range" min="50" max="180" step="1" value="100" />
            <span id="custom-shadow-strength-output" class="range-field-output">100%</span>
          </label>
        </form>
        <div class="custom-theme-actions">
          <button id="custom-preview-btn" type="button">预览</button>
          <button id="custom-theme-save-btn" type="button">保存自定义主题</button>
          <button id="custom-theme-reset-btn" type="button">恢复默认自定义</button>
        </div>
        <p id="custom-theme-message" class="hint"></p>
      </section>

      <section class="panel panel-wide">
        <div class="panel-head">
          <h2>公开页文案</h2>
          <span class="hint">可自定义公开页标题与常用标签</span>
        </div>
        <form id="copy-form" class="copy-grid">
          <label>
            顶部眉标
            <input id="copy-public-eyebrow" type="text" maxlength="80" />
          </label>
          <label>
            页面主标题
            <input id="copy-public-title" type="text" maxlength="80" />
          </label>
          <label>
            页面副标题
            <input id="copy-public-subtitle" type="text" maxlength="80" />
          </label>
          <label>
            挂件区标题
            <input id="copy-public-widgets-title" type="text" maxlength="80" />
          </label>
          <label>
            “当前状态”标签
            <input id="copy-public-state-label" type="text" maxlength="80" />
          </label>
          <label>
            “备注”标签
            <input id="copy-public-note-label" type="text" maxlength="80" />
          </label>
          <label>
            “更新时间”标签
            <input id="copy-public-updated-label" type="text" maxlength="80" />
          </label>
          <label>
            空挂件提示文案
            <input id="copy-public-empty-widgets" type="text" maxlength="80" />
          </label>
        </form>
        <div class="copy-actions">
          <button id="copy-save-btn" type="button">保存文案</button>
          <button id="copy-reset-btn" type="button">恢复默认文案</button>
        </div>
        <p id="copy-message" class="hint"></p>
      </section>

      <section class="panel panel-wide">
        <div class="panel-head">
          <h2>挂件管理</h2>
          <button id="refresh-all">刷新全部</button>
        </div>
        <div id="widget-list" class="widget-list"></div>
      </section>
    </main>

    <template id="widget-template">
      <article class="widget-card" data-online="unknown">
        <header>
          <div class="widget-head-left">
            <img class="server-icon hidden" alt="服务器图标" />
            <h3 class="widget-name"></h3>
          </div>
          <span class="widget-kind"></span>
        </header>
        <p class="widget-line"><strong>目标：</strong><span class="target"></span></p>
        <p class="widget-line"><strong>在线：</strong><span class="online"></span></p>
        <p class="widget-line"><strong>版本：</strong><span class="version"></span></p>
        <p class="widget-line"><strong>服务端：</strong><span class="software"></span></p>
        <p class="widget-line"><strong>人数：</strong><span class="players"></span></p>
        <p class="widget-line"><strong>MOTD：</strong><span class="motd"></span></p>
        <p class="widget-line"><strong>延迟：</strong><span class="latency"></span></p>
        <p class="widget-line"><strong>更新时间：</strong><span class="updated-at"></span></p>
        <p class="error"></p>
        <div class="button-row">
          <button class="refresh-btn">刷新</button>
          <button class="edit-btn" type="button">编辑</button>
          <button class="delete-btn danger" type="button">删除</button>
        </div>
        <div class="button-row order-row">
          <button class="move-up-btn" type="button">上移</button>
          <button class="move-down-btn" type="button">下移</button>
        </div>
      </article>
    </template>

    <script src="/static/theme.js"></script>
    <script src="/static/admin.js"></script>
  </body>
</html>

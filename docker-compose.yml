services:
  meowstatus:
    build: .
    container_name: meowstatus
    ports:
      - "8080:8080"
    environment:
      STATUS_HUB_HOST: 0.0.0.0
      STATUS_HUB_PORT: 8080
      STATUS_HUB_DB: /app/data/status_hub.db
      WIDGET_POLL_INTERVAL: 60
      MEOWSTATUS_ADMIN_TOKEN: change-me
      MEOWSTATUS_ADMIN_PATH: /admin
      MEOWSTATUS_AUTH_MAX_ATTEMPTS: 5
      MEOWSTATUS_AUTH_WINDOW_SEC: 60
      MEOWSTATUS_AUTH_LOCKOUT_SEC: 300
    volumes:
      - ./data:/app/data
    restart: unless-stopped
